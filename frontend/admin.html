<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Дархан-Ус Суваг ХК</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>@media print { .sidebar, #menu-toggle, .sidebar-overlay { display:none!important; } .main-content { margin-left:0!important; } }</style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-scrollable">
        <div class="sidebar-user-card">
          <p class="user-label">Хэрэглэгч</p>
          <p class="user-fullname" id="sidebar-username">…</p>
          <p class="user-username" id="sidebar-role">…</p>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin.html" class="nav-item active">Админ</a>
          <a href="/stations-internal.html" class="nav-item">Ус түгээх байрууд</a>
          <a href="/reports.html" class="nav-item">Тайлан</a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-sidebar-logout">Гарах</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <button id="menu-toggle" class="menu-toggle">☰ Цэс</button>
        <span class="topbar-title">Админ тохиргоо</span>
      </div>

      <div class="app-page">
        <div class="tab-list">
          <button class="tab-btn active" data-tab="departments">Алба</button>
          <button class="tab-btn" data-tab="teams">Засварын бригад</button>
          <button class="tab-btn" data-tab="users">Хэрэглэгчид</button>
          <button class="tab-btn" data-tab="stations">Ус түгээх байр</button>
          <button class="tab-btn" data-tab="archive">Архив</button>
          <button class="tab-btn" data-tab="auditlog">Үйлдлийн лог</button>
        </div>

        <!-- Departments panel -->
        <div class="tab-panel" data-panel="departments">
          <div class="card section-stack">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <h2 style="font-size:17px;font-weight:700">Албадын жагсаалт</h2>
              <button class="btn btn-primary btn-sm" id="dept-add-btn">+ Нэмэх</button>
            </div>
            <div id="dept-list" class="section-stack"></div>
          </div>
        </div>

        <!-- Teams panel -->
        <div class="tab-panel hidden" data-panel="teams">
          <div class="card section-stack">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <h2 style="font-size:17px;font-weight:700">Бригадын жагсаалт</h2>
              <button class="btn btn-primary btn-sm" id="team-add-btn">+ Нэмэх</button>
            </div>
            <div id="team-list" class="section-stack"></div>
          </div>
        </div>

        <!-- Users panel -->
        <div class="tab-panel hidden" data-panel="users">
          <div class="card section-stack">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <h2 style="font-size:17px;font-weight:700">Хэрэглэгчдийн жагсаалт</h2>
              <button class="btn btn-primary btn-sm" id="user-add-btn">+ Нэмэх</button>
            </div>
            <div id="user-list" class="section-stack"></div>
          </div>
        </div>

        <!-- Stations panel -->
        <div class="tab-panel hidden" data-panel="stations">
          <div class="card" style="padding:12px 16px;margin-bottom:16px">
            <input id="station-search-input" type="search" class="input" placeholder="Код, байршил, хянагчаар хайх…">
          </div>
          <div class="card section-stack">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <h2 style="font-size:17px;font-weight:700">Ус түгээх байрууд</h2>
              <button class="btn btn-primary btn-sm" id="station-add-btn">+ Нэмэх</button>
            </div>
            <div id="station-list" class="stations-admin-grid"></div>
          </div>
        </div>

        <!-- Archive panel -->
        <div class="tab-panel hidden" data-panel="archive">
          <div id="archive-content" class="section-stack"></div>
        </div>

        <!-- Audit log panel -->
        <div class="tab-panel hidden" data-panel="auditlog">
          <div class="card section-stack">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
              <h2 style="font-size:17px;font-weight:700">Үйлдлийн лог <span style="font-size:12px;font-weight:400;color:var(--slate-500)">(сүүлийн 500)</span></h2>
              <button id="audit-filter-reset" class="btn btn-ghost btn-sm">Цэвэрлэх</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end">
              <div class="field" style="margin:0">
                <input id="audit-search" type="text" class="input" placeholder="Нэр, объект, хэрэглэгчээр хайх…">
              </div>
              <select id="audit-filter-action" class="select" style="min-width:130px">
                <option value="all">Бүх үйлдэл</option>
                <option value="create">Үүсгэсэн</option>
                <option value="update">Засварласан</option>
                <option value="archive">Архивласан</option>
                <option value="restore">Сэргээсэн</option>
              </select>
              <select id="audit-filter-entity" class="select" style="min-width:130px">
                <option value="all">Бүх объект</option>
                <option value="department">Алба</option>
                <option value="team">Бригад</option>
                <option value="user">Хэрэглэгч</option>
                <option value="station">Ус түгээх байр</option>
              </select>
            </div>
            <div id="audit-log-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="admin-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:480px;margin:60px auto">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/assets/js/pages/admin.js"></script>
</body>
</html>
