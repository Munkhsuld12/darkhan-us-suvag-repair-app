<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нэвтрэх — Дархан-Ус Суваг ХК</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <!-- Floating header — logo links back to homepage -->
  <header class="pub-header">
    <div class="pub-header-wrap">
      <div class="pub-header-card">
        <a href="/" style="flex-shrink:0;max-width:min(74vw,360px);overflow:hidden;display:block">
          <img src="/DUS-name-logo-out-light.png" alt="Дархан Ус Суваг ХК" style="height:40px;width:auto;object-fit:contain;display:block">
        </a>
        <a href="/" class="btn btn-ghost btn-sm" style="flex-shrink:0;color:var(--slate-600)">← Нүүр</a>
      </div>
    </div>
  </header>

  <div class="login-page">
    <div class="login-card">
      <!-- Header -->
      <div>
        <p class="login-heading-sub">Нэвтрэх</p>
        <h2 class="login-heading">Дотоод хэрэглэгч</h2>
      </div>

      <!-- Demo accounts -->
      <div style="margin-top:18px">
        <p style="font-size:13px;font-weight:600;color:var(--slate-600)">Туршилтын хэрэглэгч</p>
        <div class="demo-grid" style="margin-top:10px">
          <button class="demo-btn" data-username="admin" data-password="admin123">
            <span class="demo-role">Админ</span>
            <span class="demo-creds">admin / admin123</span>
          </button>
          <button class="demo-btn" data-username="dispatcher" data-password="dispatch123">
            <span class="demo-role">Диспетчер</span>
            <span class="demo-creds">dispatcher / dispatch123</span>
          </button>
          <button class="demo-btn" data-username="chief" data-password="chief123">
            <span class="demo-role">Ерөнхий инженер</span>
            <span class="demo-creds">chief / chief123</span>
          </button>
          <button class="demo-btn" data-username="eng1" data-password="eng123">
            <span class="demo-role">Хэлтсийн инженер</span>
            <span class="demo-creds">eng1 / eng123</span>
          </button>
          <button class="demo-btn" data-username="bat" data-password="bat123" style="grid-column:1/-1">
            <span class="demo-role">Бригадын ахлагч</span>
            <span class="demo-creds">bat / bat123</span>
          </button>
        </div>
      </div>

      <!-- Login form -->
      <form id="login-form" class="field-grid" style="margin-top:20px">
        <div class="field">
          <label for="username">Нэвтрэх нэр</label>
          <input id="username" type="text" class="input" placeholder="Жишээ: admin" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Нууц үг</label>
          <input id="password" type="password" class="input" placeholder="Нууц үгээ оруулна" required autocomplete="current-password">
        </div>
        <p id="login-error" class="error-msg" style="display:none"></p>
        <button id="login-btn" type="submit" class="btn btn-primary btn-full btn-lg">Нэвтрэх</button>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/pages/login.js"></script>
  <script type="module">
    // Wire up demo account buttons
    document.querySelectorAll('.demo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('username').value = btn.dataset.username;
        document.getElementById('password').value = btn.dataset.password;
        const err = document.getElementById('login-error');
        if (err) { err.style.display = 'none'; err.textContent = ''; }
      });
    });
  </script>
</body>
</html>
